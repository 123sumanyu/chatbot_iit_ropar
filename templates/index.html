<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IPR Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app-bg">
    <div class="chat-container">

        <!-- HEADER -->
        <div class="chat-header">
            <img src="/static/bot.png" class="bot-avatar">
            <div>
                <h2>IPR Chatbot</h2>
                <span class="status">Online • Ask about IPR</span>
            </div>
        </div>

        <!-- CHAT AREA -->
        <div id="chat-box"></div>

        <!-- INPUT -->
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Ask about patents, copyright, trademark..." />
            <button onclick="sendMessage()">➤</button>
        </div>

    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
